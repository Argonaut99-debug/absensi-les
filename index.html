<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurnal & Absensi Kalender Les</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #f0f4f8;
            padding: 20px;
            color: #333;
        }
        .main-wrapper {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media (min-width: 768px) {
            .main-wrapper {
                grid-template-columns: 1.2fr 1fr;
            }
        }
        .card {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2, h3 {
            color: #2c3e50;
            margin-bottom: 15px;
        }
        /* Style Kalender */
        input[type="date"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #3182ce;
            border-radius: 8px;
            outline: none;
            text-align: center;
            font-weight: bold;
            color: #3182ce;
            background-color: #fff;
        }
        /* Style Form Konten */
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #4a5568;
        }
        textarea {
            width: 100%;
            height: 80px;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 15px;
            resize: none;
        }
        /* Checklist Siswa */
        .student-list {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            max-height: 250px;
            overflow-y: auto;
        }
        .student-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            border-bottom: 1px solid #edf2f7;
        }
        .student-item:last-child {
            border-bottom: none;
        }
        input[type="checkbox"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #3182ce;
        }
        /* Tombol-tombol */
        .btn-block {
            display: block;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
            text-align: center;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-blue {
            background-color: #3182ce;
            color: white;
        }
        .btn-blue:hover {
            background-color: #2b6cb0;
        }
        .btn-green {
            background-color: #25d366;
            color: white;
        }
        .btn-green:hover {
            background-color: #1ebd58;
        }
        .btn-action {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 15px;
        }
        .btn-view { background-color: #4a5568; color: white; }
        .btn-delete { background-color: #e53e3e; color: white; }
        
        /* Notifikasi */
        .notif {
            text-align: center;
            color: #38a169;
            font-weight: bold;
            margin-top: 10px;
            display: none;
        }
        /* Style Tabel Riwayat */
        .riwayat-wrapper {
            max-width: 900px;
            margin: 20px auto 0 auto;
        }
        .tabel-riwayat {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }
        .tabel-riwayat th, .tabel-riwayat td {
            border: 1px solid #cbd5e0;
            padding: 10px;
            text-align: left;
        }
        .tabel-riwayat th {
            background-color: #edf2f7;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    
    <!-- SISI KIRI: KALENDER -->
    <div class="card">
        <h2>📅 Pilih Tanggal Les</h2>
        <div class="form-group">
            <input type="date" id="kalenderPicker">
        </div>
        <p style="font-size: 14px; color: #718096; text-align: center; margin-top: 10px;">
            *Silakan pilih tanggal untuk melihat, mengisi, atau mengirim laporan WA pada hari tersebut.
        </p>
    </div>

    <!-- SISI KANAN: INPUT DATA -->
    <div class="card">
        <h3 id="displayTanggal">Detail Jurnal</h3>
        
        <form id="jurnalForm">
            <!-- Isi Materi -->
            <div class="form-group">
                <label for="materi">Materi Pembelajaran</label>
                <textarea id="materi" placeholder="Ketik materi pelajaran hari ini..."></textarea>
            </div>

            <!-- Checklist Siswa -->
            <div class="form-group">
                <label>Checklist Kedatangan Siswa</label>
                <div class="student-list" id="daftarSiswaContainer">
                    <!-- Diisi otomatis oleh JavaScript -->
                </div>
            </div>

            <!-- Tombol Simpan Internal -->
            <button type="submit" class="btn-block btn-blue">💾 Simpan di HP/Laptop</button>
            
            <!-- Tombol Kirim Ke WhatsApp -->
            <button type="button" class="btn-block btn-green" onclick="kirimKeWA()">🟢 Kirim Laporan ke WA</button>
            
            <div class="notif" id="notifSukses">Data Berhasil Disimpan! ✓</div>
        </form>
    </div>

</div>

<!-- BAGIAN BAWAH: DATABASE RIWAYAT -->
<div class="riwayat-wrapper card">
    <h3>📂 Data Rekapan Jurnal</h3>
    <button class="btn-action btn-view" onclick="tampilkanRiwayat()">👁️ Lihat Semua Riwayat</button>
    <button class="btn-action btn-delete" onclick="hapusSemuaData()">🗑️ Hapus Semua Data</button>
    
    <table class="tabel-riwayat" id="tabelRiwayat">
        <thead>
            <tr>
                <th>Tanggal</th>
                <th>Materi Pembelajaran</th>
                <th>Siswa yang Hadir</th>
            </tr>
        </thead>
        <tbody id="bodyTabelRiwayat">
            <!-- Data riwayat masuk ke sini -->
        </tbody>
    </table>
</div>

<script>
    // ===================================================
    //  --- SILAKAN GANTI/TAMBAH NAMA SISWA ANDA DI SINI ---
    // ===================================================
    const daftarSiswa = ["Talita"];

    const kalenderPicker = document.getElementById('kalenderPicker');
    const displayTanggal = document.getElementById('displayTanggal');
    const materiInput = document.getElementById('materi');
    const containerSiswa = document.getElementById('daftarSiswaContainer');
    const notifSukses = document.getElementById('notifSukses');

    // Set tanggal default ke hari ini
    const hariIni = new Date().toISOString().split('T')[0];
    kalenderPicker.value = hariIni;

    function formatTanggalTeks(dateString) {
        return "Jurnal: " + new Date(dateString).toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function susunDaftarSiswa() {
        containerSiswa.innerHTML = '';
        daftarSiswa.forEach((nama, index) => {
            const div = document.createElement('div');
            div.className = 'student-item';
            div.innerHTML = `
                <span>${nama}</span>
                <input type="checkbox" class="cek-siswa" data-nama="${nama}">
            `;
            containerSiswa.appendChild(div);
        });
    }

    function muatDataTanggal(tanggal) {
        displayTanggal.innerText = formatTanggalTeks(tanggal);
        const semuaData = JSON.parse(localStorage.getItem('jurnalLes')) || {};
        const dataHariIni = semuaData[tanggal] || { materi: "", kehadiran: [] };

        materiInput.value = dataHariIni.materi;
        document.querySelectorAll('.cek-siswa').forEach(cb => {
            const namaSiswa = cb.getAttribute('data-nama');
            cb.checked = dataHariIni.kehadiran.includes(namaSiswa);
        });
    }

    kalenderPicker.addEventListener('change', function() {
        muatDataTanggal(this.value);
    });

    // Proses Simpan ke Browser Lokal
    document.getElementById('jurnalForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const tanggalTerpilih = kalenderPicker.value;
        let siswaHadir = [];
        
        document.querySelectorAll('.cek-siswa').forEach(cb => {
            if (cb.checked) siswaHadir.push(cb.getAttribute('data-nama'));
        });

        const semuaData = JSON.parse(localStorage.getItem('jurnalLes')) || {};
        semuaData[tanggalTerpilih] = {
            materi: materiInput.value,
            kehadiran: siswaHadir
        };

        localStorage.setItem('jurnalLes', JSON.stringify(semuaData));

        notifSukses.style.display = 'block';
        setTimeout(() => { notifSukses.style.display = 'none'; }, 2000);
        
        if(document.getElementById('tabelRiwayat').style.display === 'table') tampilkanRiwayat();
    });

    // PROSES CARA KE-1: KIRIM KE WHATSAPP
    function kirimKeWA() {
        const tanggalTerpilih = kalenderPicker.value;
        
        // Memformat tanggal agar lebih enak dibaca di WA (Contoh: 18 Mei 2026)
        const tanggalFormatWA = new Date(tanggalTerpilih).toLocaleDateString('id-ID', {  weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        
        const materiTerpilih = materiInput.value.trim() || "Tidak ada materi khusus";
        
        let siswaHadir = [];
        let siswaAbsen = [];
        
        document.querySelectorAll('.cek-siswa').forEach(cb => {
            const namaSiswa = cb.getAttribute('data-nama');
            if (cb.checked) {
                siswaHadir.push(namaSiswa);
            } else {
                siswaAbsen.push(namaSiswa);
            }
        });

        // Menyusun format teks pesan WhatsApp (Menggunakan kode %0A untuk ganti baris baru)
        const pesan = `*LAPORAN KEHADIRAN LES* 📝%0A%0A` +
                      `📅 *Hari/Tanggal:* ${tanggalFormatWA}%0A` +
                      `📖 *Materi Pelajaran:* ${materiTerpilih}%0A` +
                      `-----------------------------------------%0A` +
                      `✅ *Siswa Hadir (${siswaHadir.length}):*%0A${siswaHadir.map(s => `- ${s}`).join('%0A') || '-'}%0A%0A` +
                      `❌ *Siswa Absen (${siswaAbsen.length}):*%0A${siswaAbsen.map(s => `- ${s}`).join('%0A') || '-'}`;

        // Membuka tautan WhatsApp universal
        window.open(`https://wa.me/?text=${pesan}`, '_blank');
    }

    function tampilkanRiwayat() {
        const semuaData = JSON.parse(localStorage.getItem('jurnalLes')) || {};
        const tabel = document.getElementById('tabelRiwayat');
        const tbody = document.getElementById('bodyTabelRiwayat');
        
        tbody.innerHTML = '';
        const semuaTanggal = Object.keys(semuaData).sort().reverse();
        
        if(semuaTanggal.length === 0) {
            alert("Belum ada data yang disimpan di perangkat ini.");
            return;
        }

        semuaTanggal.forEach(tgl => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><b>${tgl}</b></td>
                <td>${semuaData[tgl].materi || '-'}</td>
                <td>${semuaData[tgl].kehadiran.join(', ') || 'Tidak ada yang hadir'}</td>
            `;
            tbody.appendChild(row);
        });

        tabel.style.display = 'table';
    }

    function hapusSemuaData() {
        if(confirm("Apakah Anda yakin ingin menghapus seluruh riwayat? Data tidak bisa dikembalikan!")) {
            localStorage.removeItem('jurnalLes');
            document.getElementById('tabelRiwayat').style.display = 'none';
            muatDataTanggal(kalenderPicker.value);
            alert("Semua data berhasil dibersihkan.");
        }
    }

    // Jalankan sistem saat web dibuka
    susunDaftarSiswa();
    muatDataTanggal(hariIni);
</script>

</body>
</html>
