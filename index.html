<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurnal & Absensi Cloud Les</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; }
        body { background-color: #f0f4f8; padding: 20px; color: #333; }
        .main-wrapper { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { .main-wrapper { grid-template-columns: 1.2fr 1fr; } }
        .card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2, h3 { color: #2c3e50; margin-bottom: 15px; }
        input[type="date"] { width: 100%; padding: 12px; font-size: 16px; border: 2px solid #3182ce; border-radius: 8px; outline: none; text-align: center; font-weight: bold; color: #3182ce; background-color: #fff; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; color: #4a5568; }
        textarea { width: 100%; height: 80px; padding: 10px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 15px; resize: none; }
        .student-list { border: 1px solid #e2e8f0; border-radius: 8px; max-height: 250px; overflow-y: auto; }
        .student-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; border-bottom: 1px solid #edf2f7; }
        .student-item:last-child { border-bottom: none; }
        input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; accent-color: #3182ce; }
        .btn-block { display: block; width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 12px; text-align: center; text-decoration: none; }
        .btn-blue { background-color: #3182ce; color: white; }
        .btn-green { background-color: #25d366; color: white; }
        .btn-action { padding: 10px 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-bottom: 15px; background-color: #4a5568; color: white; }
        .notif { text-align: center; color: #38a169; font-weight: bold; margin-top: 10px; display: none; }
        .riwayat-wrapper { max-width: 900px; margin: 20px auto 0 auto; }
        .tabel-riwayat { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; display: none; }
        .tabel-riwayat th, .tabel-riwayat td { border: 1px solid #cbd5e0; padding: 10px; text-align: left; }
        .tabel-riwayat th { background-color: #edf2f7; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <!-- SISI KIRI -->
    <div class="card">
        <h2>📅 Pilih Tanggal Les</h2>
        <div class="form-group"><input type="date" id="kalenderPicker"></div>
    </div>

    <!-- SISI KANAN -->
    <div class="card">
        <h3 id="displayTanggal">Detail Jurnal</h3>
        <form id="jurnalForm">
            <div class="form-group">
                <label for="materi">Materi Pembelajaran</label>
                <textarea id="materi" placeholder="Ketik materi pelajaran..."></textarea>
            </div>
            <div class="form-group">
                <label>Checklist Kedatangan Siswa</label>
                <div class="student-list" id="daftarSiswaContainer"></div>
            </div>
            <button type="submit" id="btnSimpan" class="btn-block btn-blue">💾 Simpan Online ke Cloud</button>
            <button type="button" class="btn-block btn-green" onclick="kirimKeWA()">🟢 Kirim Laporan ke WA</button>
            <div class="notif" id="notifSukses">Memproses data...</div>
        </form>
    </div>
</div>

<div class="riwayat-wrapper card">
    <h3>📂 Data Rekapan Jurnal (Google Sheets)</h3>
    <button class="btn-action" onclick="tampilkanRiwayat()">👁️ Ambil & Lihat Riwayat Dari Cloud</button>
    <table class="tabel-riwayat" id="tabelRiwayat">
        <thead>
            <tr><th>Tanggal</th><th>Materi Pembelajaran</th><th>Siswa yang Hadir</th></tr>
        </thead>
        <tbody id="bodyTabelRiwayat"></tbody>
    </table>
</div>

<script>
    // =================================================================
    // 1. UTAMA: PASTE LINK GOOGLE APPS SCRIPT ANDA DI BAWAH INI !!!
    // =================================================================
    const URL_DATABASE = "https://script.google.com/macros/s/AKfycbzr3GuVH5dTFEB_twwqYXKSeGgYMTCxPqzPHnJ6B7RzG9hN7nNqfX3ZIDdD5arCDa4Drg/exec";

    // 2. ATUR NAMA SISWA ANDA DI SINI
    const daftarSiswa = ["Talita"];

    const kalenderPicker = document.getElementById('kalenderPicker');
    const displayTanggal = document.getElementById('displayTanggal');
    const materiInput = document.getElementById('materi');
    const containerSiswa = document.getElementById('daftarSiswaContainer');
    const notifSukses = document.getElementById('notifSukses');

    const hariIni = new Date().toISOString().split('T')[0];
    kalenderPicker.value = hariIni;
    displayTanggal.innerText = "Jurnal: " + new Date(hariIni).toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' });

    function susunDaftarSiswa() {
        containerSiswa.innerHTML = '';
        daftarSiswa.forEach(nama => {
            containerSiswa.innerHTML += `
                <div class="student-item">
                    <span>${nama}</span>
                    <input type="checkbox" class="cek-siswa" data-nama="${nama}">
                </div>`;
        });
    }

    // KIRIM DATA KE GOOGLE SHEETS
    document.getElementById('jurnalForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSimpan');
        btn.disabled = true;
        notifSukses.innerText = "Sedang Menyimpan ke Google Sheets...";
        notifSukses.style.display = 'block';

        let siswaHadir = [];
        document.querySelectorAll('.cek-siswa').forEach(cb => {
            if (cb.checked) siswaHadir.push(cb.getAttribute('data-nama'));
        });

        const dataKirim = {
            tanggal: kalenderPicker.value,
            materi: materiInput.value,
            kehadiran: siswaHadir.join(', ')
        };

        fetch(URL_DATABASE, {
            method: "POST",
            body: JSON.stringify(dataKirim)
        })
        .then(res => res.json())
        .then(hasil => {
            notifSukses.innerText = "Berhasil Disimpan Ke Cloud! ✓";
            btn.disabled = false;
            setTimeout(() => { notifSukses.style.display = 'none'; }, 2000);
        })
        .catch(err => {
            alert("Gagal menyimpan ke Cloud. Pastikan internet aktif atau URL script benar.");
            btn.disabled = false;
            notifSukses.style.display = 'none';
        });
    });

    // AMBIL DATA DARI GOOGLE SHEETS
    function tampilkanRiwayat() {
        const tbody = document.getElementById('bodyTabelRiwayat');
        const tabel = document.getElementById('tabelRiwayat');
        tbody.innerHTML = '<tr><td colspan="3">Sedang mengambil data dari Cloud...</td></tr>';
        tabel.style.display = 'table';

        fetch(URL_DATABASE)
        .then(res => res.json())
        .then(data => {
            tbody.innerHTML = '';
            if(data.length === 0){
                tbody.innerHTML = '<tr><td colspan="3">Belum ada data di Google Sheets.</td></tr>';
                return;
            }
            data.reverse().forEach(row => {
                let tglFormat = row.tanggal ? row.tanggal.split('T')[0] : '-';
                tbody.innerHTML += `<tr>
                    <td><b>${tglFormat}</b></td>
                    <td>${row.materi || '-'}</td>
                    <td>${row.kehadiran || 'Tidak ada'}</td>
                </tr>`;
            });
        });
    }

    function kirimKeWA() {
        const tanggalFormatWA = new Date(kalenderPicker.value).toLocaleDateString('id-ID', {  weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        let siswaHadir = [], siswaAbsen = [];
        document.querySelectorAll('.cek-siswa').forEach(cb => {
            if (cb.checked) siswaHadir.push(cb.getAttribute('data-nama')); else siswaAbsen.push(cb.getAttribute('data-nama'));
        });
        const pesan = `*LAPORAN KEHADIRAN LES* 📝%0A%0A📅 *Hari/Tanggal:* ${tanggalFormatWA}%0A📖 *Materi:* ${materiInput.value || '-'}%0A-----------------------------------------%0A✅ *Hadir:* ${siswaHadir.join(', ') || '-'}%0A❌ *Absen:* ${siswaAbsen.join(', ') || '-'}`;
        window.open(`https://wa.me/?text=${pesan}`, '_blank');
    }

    susunDaftarSiswa();
</script>
</body>
</html>
